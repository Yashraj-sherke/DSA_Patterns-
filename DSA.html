.pattern-row td:first-child{border-left:4px solid #667eea}
a{color:#667eea;text-decoration:none;font-size:.75rem}

#num{text-align:center;font-size:.7rem;color:#666}

["Construct from Preorder & Postorder","medium",["https://leetcode.com/problems/construct-binary-tree-from-preorder-and-postorder-traversal/description/"]],
["Sorted Array to BST","easy",["https://leetcode.com/problems/convert-sorted-array-to-binary-search-tree/description/"]],
["Sorted List to BST","medium",["https://leetcode.com/problems/convert-sorted-list-to-binary-search-tree/description/"]],
["Serialize & Deserialize Binary Tree","hard",["https://leetcode.com/problems/serialize-and-deserialize-binary-tree/description/"]]]]
];
const KEY="dsa_tracker_v2";
let saved=JSON.parse(localStorage.getItem(KEY)||"{}");
const tbody=document.getElementById("tbody");
let idx=0,patterns=new Set();
D.forEach(([pat,problems])=>{
patterns.add(pat);
let pr=document.createElement("tr");pr.className="pattern-row";pr.dataset.pattern=pat;
pr.innerHTML=`<td colspan="9">📌 ${pat} (${problems.length} problems)</td>`;
tbody.appendChild(pr);
problems.forEach(([name,diff,links])=>{
idx++;let id="p"+idx;
let s=saved[id]||{status:"Not Started",date:"",rev:"No",notes:""};
let linkHtml=links.map((l,i)=>`<a href="${l}" target="_blank">Link ${i+1}</a>`).join(" ");
let tr=document.createElement("tr");tr.dataset.pattern=pat;tr.dataset.diff=diff;tr.dataset.name=name.toLowerCase();
tr.innerHTML=`<td style="color:#555">${idx}</td><td style="color:#888;font-size:.7rem">${pat}</td><td><b>${name}</b></td>
<td><span class="diff ${diff}">${diff.toUpperCase()}</span></td><td>${linkHtml||"—"}</td>
<td><select class="status-sel" data-id="${id}" data-field="status"><option${s.status=="Not Started"?" selected":""}>Not Started</option><option${s.status=="In Progress"?" selected":""}>In Progress</option><option${s.status=="Done"?" selected":""}>Done</option><option${s.status=="Revisit"?" selected":""}>Revisit</option></select></td>
<td><input type="date" class="date-input" data-id="${id}" data-field="date" value="${s.date}"></td>
<td><select class="rev-sel" data-id="${id}" data-field="rev"><option${s.rev=="No"?" selected":""}>No</option><option${s.rev=="Yes"?" selected":""}>Yes</option></select></td>
<td><input class="notes-input" data-id="${id}" data-field="notes" value="${s.notes}" placeholder="Add notes..."></td>`;
tbody.appendChild(tr);
});
});
document.getElementById("totalQ").textContent=idx;
// Filters
const fb=document.getElementById("filterBtns");
let allBtn=document.createElement("button");allBtn.textContent="All";allBtn.className="active";allBtn.onclick=()=>filterBy("");fb.appendChild(allBtn);
patterns.forEach(p=>{let b=document.createElement("button");b.textContent=p;b.onclick=()=>filterBy(p);fb.appendChild(b);});
function filterBy(p){
document.querySelectorAll(".filters button").forEach(b=>b.classList.remove("active"));
if(!p)document.querySelector(".filters button").classList.add("active");
else [...document.querySelectorAll(".filters button")].find(b=>b.textContent===p)?.classList.add("active");
tbody.querySelectorAll("tr").forEach(r=>{r.style.display=(!p||r.dataset.pattern===p)?"":"none";});
}
document.getElementById("searchBox").addEventListener("input",e=>{
let q=e.target.value.toLowerCase();
tbody.querySelectorAll("tr:not(.pattern-row)").forEach(r=>{r.style.display=(r.dataset.name||"").includes(q)?"":"none";});
tbody.querySelectorAll(".pattern-row").forEach(r=>{r.style.display=q?"none":"";});
});
function saveAll(){
let d={};
document.querySelectorAll("[data-id]").forEach(el=>{
let id=el.dataset.id,f=el.dataset.field;if(!d[id])d[id]={};d[id][f]=el.value;
});
localStorage.setItem(KEY,JSON.stringify(d));saved=d;updateStats();
let t=document.getElementById("toast");t.classList.add("show");setTimeout(()=>t.classList.remove("show"),2000);
}
function updateStats(){
let done=0,rev=0;
document.querySelectorAll("select.status-sel").forEach(s=>{if(s.value==="Done")done++;});
document.querySelectorAll("select.rev-sel").forEach(s=>{if(s.value==="Yes")rev++;});
document.getElementById("doneQ").textContent=done;
document.getElementById("pctQ").textContent=Math.round(done/idx*100)+"%";
document.getElementById("revQ").textContent=rev;
}
document.addEventListener("change",e=>{if(e.target.dataset?.id)saveAll();});
updateStats();
</script>
</body>
</html>
