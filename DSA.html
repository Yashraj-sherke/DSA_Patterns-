.filters{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-bottom:20px}

table{width:100%;border-collapse:separate;border-spacing:0;background:#12121f;border-radius:12px;overflow:hidden;min-width:900px}

tbody tr{transition:background .2s}
tbody tr:hover{background:#1e1e36}
tbody td{padding:9px 10px;border-bottom:1px solid #1e1e30;font-size:.8rem;vertical-align:middle}

a{color:#667eea;text-decoration:none;font-size:.75rem}

.sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0}

 body{padding:10px}

</div>
</main>

const KEY="dsa_tracker_v2";
let saved={};
try{saved=JSON.parse(localStorage.getItem(KEY)||"{}");}catch(e){console.warn("Failed to load saved data",e);saved={};}

const tbody=document.getElementById("tbody");
let idx=0;
const patterns=new Set();

// Build table
D.forEach(([pat,problems])=>{
patterns.add(pat);
const pr=document.createElement("tr");pr.className="pattern-row";pr.dataset.pattern=pat;
pr.setAttribute("role","row");
pr.innerHTML=`<td colspan="9" role="gridcell">📌 ${pat} (${problems.length} problems)</td>`;
tbody.appendChild(pr);
problems.forEach(([name,diff,links])=>{
idx++;const id="p"+idx;
const s=saved[id]||{status:"Not Started",date:"",rev:"No",notes:""};
const linkHtml=links.map((l,i)=>`<a href="${l}" target="_blank" rel="noopener noreferrer">Link ${i+1}</a>`).join(" ");
const tr=document.createElement("tr");tr.dataset.pattern=pat;tr.dataset.diff=diff;tr.dataset.name=name.toLowerCase();
tr.setAttribute("role","row");
tr.innerHTML=`<td style="color:#555">${idx}</td><td style="color:#888;font-size:.7rem">${pat}</td><td><b>${name}</b></td>
<td><span class="diff ${diff}" role="text" aria-label="Difficulty: ${diff}">${diff.toUpperCase()}</span></td><td>${linkHtml||"—"}</td>
<td><select class="status-sel" data-id="${id}" data-field="status" aria-label="Status for ${name}"><option${s.status==="Not Started"?" selected":""}>Not Started</option><option${s.status==="In Progress"?" selected":""}>In Progress</option><option${s.status==="Done"?" selected":""}>Done</option><option${s.status==="Revisit"?" selected":""}>Revisit</option></select></td>
<td><input type="date" class="date-input" data-id="${id}" data-field="date" value="${s.date}" aria-label="Date done for ${name}"></td>
<td><select class="rev-sel" data-id="${id}" data-field="rev" aria-label="Needs revision for ${name}"><option${s.rev==="No"?" selected":""}>No</option><option${s.rev==="Yes"?" selected":""}>Yes</option></select></td>
<td><input class="notes-input" data-id="${id}" data-field="notes" value="${escapeHtml(s.notes)}" placeholder="Add notes..." aria-label="Notes for ${name}"></td>`;
tbody.appendChild(tr);
});
});
document.getElementById("totalQ").textContent=idx;

function escapeHtml(str){
if(!str)return"";
const map={"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"};
return str.replace(/[&<>"']/g,c=>map[c]);
}

// Filters
const fb=document.getElementById("filterBtns");
const allBtn=document.createElement("button");allBtn.textContent="All";allBtn.className="active";allBtn.onclick=()=>filterBy("");fb.appendChild(allBtn);
patterns.forEach(p=>{const b=document.createElement("button");b.textContent=p;b.onclick=()=>filterBy(p);fb.appendChild(b);});

function filterBy(p){
document.querySelectorAll(".filters button").forEach(b=>b.classList.remove("active"));
if(!p)document.querySelector(".filters button").classList.add("active");
else[...document.querySelectorAll(".filters button")].find(b=>b.textContent===p)?.classList.add("active");
tbody.querySelectorAll("tr").forEach(r=>{r.style.display=(!p||r.dataset.pattern===p)?"":"none";});
}

// Debounced search
let searchTimer;
document.getElementById("searchBox").addEventListener("input",e=>{
clearTimeout(searchTimer);
searchTimer=setTimeout(()=>{
const q=e.target.value.toLowerCase().trim();
tbody.querySelectorAll("tr:not(.pattern-row)").forEach(r=>{r.style.display=(r.dataset.name||"").includes(q)?"":"none";});
tbody.querySelectorAll(".pattern-row").forEach(r=>{r.style.display=q?"none":"";});
},150);
});

function showToast(msg,isError){
const t=document.getElementById("toast");
t.textContent=msg;
t.classList.toggle("error",!!isError);
t.classList.add("show");
setTimeout(()=>t.classList.remove("show"),2500);
}

function saveAll(){
try{
const d={};
document.querySelectorAll("[data-id]").forEach(el=>{
const id=el.dataset.id,f=el.dataset.field;if(!d[id])d[id]={};d[id][f]=el.value;
});
localStorage.setItem(KEY,JSON.stringify(d));saved=d;updateStats();
showToast("✅ Progress Saved!");
}catch(e){
console.error("Save failed:",e);
showToast("❌ Save failed — storage may be full",true);
}
}

function updateStats(){
let done=0,rev=0;
document.querySelectorAll("select.status-sel").forEach(s=>{if(s.value==="Done")done++;});
document.querySelectorAll("select.rev-sel").forEach(s=>{if(s.value==="Yes")rev++;});
document.getElementById("doneQ").textContent=done;
document.getElementById("pctQ").textContent=Math.round(done/idx*100)+"%";
document.getElementById("revQ").textContent=rev;
}

// Auto-save on change
document.addEventListener("change",e=>{if(e.target.dataset?.id)saveAll();});

// Export data as JSON
function exportData(){
try{
const d={};
document.querySelectorAll("[data-id]").forEach(el=>{
const id=el.dataset.id,f=el.dataset.field;if(!d[id])d[id]={};d[id][f]=el.value;
});
const blob=new Blob([JSON.stringify(d,null,2)],{type:"application/json"});
const url=URL.createObjectURL(blob);
const a=document.createElement("a");
a.href=url;a.download=`dsa-tracker-backup-${new Date().toISOString().slice(0,10)}.json`;
document.body.appendChild(a);a.click();document.body.removeChild(a);
URL.revokeObjectURL(url);
showToast("✅ Data exported!");
}catch(e){
console.error("Export failed:",e);
showToast("❌ Export failed",true);
}
}

// Import data from JSON
document.getElementById("importFile").addEventListener("change",e=>{
const file=e.target.files[0];if(!file)return;
const reader=new FileReader();
reader.onload=ev=>{
try{
const data=JSON.parse(ev.target.result);
if(typeof data!=="object"||data===null)throw new Error("Invalid format");
localStorage.setItem(KEY,JSON.stringify(data));
showToast("✅ Data imported! Reloading...");
setTimeout(()=>location.reload(),1000);
}catch(err){
console.error("Import failed:",err);
showToast("❌ Invalid file format",true);
}
};
reader.readAsText(file);
e.target.value="";
});

// Reset data
function resetData(){
if(!confirm("Are you sure you want to reset ALL progress? This cannot be undone."))return;
try{
localStorage.removeItem(KEY);
showToast("✅ Progress reset! Reloading...");
setTimeout(()=>location.reload(),1000);
}catch(e){
showToast("❌ Reset failed",true);
}
}

// Keyboard shortcuts
document.addEventListener("keydown",e=>{
if((e.ctrlKey||e.metaKey)&&e.key==="s"){e.preventDefault();saveAll();}
if(e.key==="/"&&!["INPUT","SELECT","TEXTAREA"].includes(document.activeElement.tagName)){
e.preventDefault();document.getElementById("searchBox").focus();}
});

// Offline detection
function updateOnlineStatus(){
document.getElementById("offlineBanner").classList.toggle("visible",!navigator.onLine);
}
window.addEventListener("online",updateOnlineStatus);
window.addEventListener("offline",updateOnlineStatus);
updateOnlineStatus();

// Service Worker registration
if("serviceWorker"in navigator){
navigator.serviceWorker.register("sw.js").catch(()=>{});
}

updateStats();
</script>
